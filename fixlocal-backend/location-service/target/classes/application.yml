server:
  port: 8092
  shutdown: graceful

spring:
  application:
    name: location-service
  lifecycle:
    timeout-per-shutdown-phase: 20s
  data:
    mongodb:
      uri: ${LOCATION_MONGO_URI:${MONGO_URI:mongodb://localhost:27017/fixlocal}}

jwt:
  secret: ${JWT_SECRET:T2Zxk9D2c0lXQkVvR2R3c1F0U1Z3Y2RrN3Z4T3p1a2VnRzQ=}
  expiration: ${JWT_EXPIRATION:86400000}

management:
  endpoint:
    health:
      probes:
        enabled: true
      show-details: never
  health:
    livenessstate:
      enabled: true
    readinessstate:
      enabled: true
  endpoints:
    web:
      exposure:
        include: health,info

logging:
  pattern:
    level: "%5p [corr:%X{correlationId:-na}]"

app:
  cors:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:http://localhost:5173}

location:
  stale-threshold-seconds: ${LIVE_LOCATION_STALE_THRESHOLD_SECONDS:300}
