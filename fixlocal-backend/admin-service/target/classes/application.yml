server:
  port: 8091
  shutdown: graceful

spring:
  application:
    name: admin-service
  lifecycle:
    timeout-per-shutdown-phase: 20s

jwt:
  secret: ${JWT_SECRET:T2Zxk9D2c0lXQkVvR2R3c1F0U1Z3Y2RrN3Z4T3p1a2VnRzQ=}
  expiration: ${JWT_EXPIRATION:86400000}

internal:
  user-service:
    base-url: ${USER_SERVICE_BASE_URL:http://localhost:8082}
  booking-service:
    base-url: ${BOOKING_SERVICE_BASE_URL:http://localhost:8084}
  chat-service:
    base-url: ${CHAT_SERVICE_BASE_URL:http://localhost:8085}

management:
  endpoint:
    health:
      probes:
        enabled: true
      show-details: never
  health:
    livenessstate:
      enabled: true
    readinessstate:
      enabled: true
  endpoints:
    web:
      exposure:
        include: health,info

logging:
  pattern:
    level: "%5p [corr:%X{correlationId:-na}]"

app:
  cors:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:http://localhost:5173}

http:
  client:
    connect-timeout-ms: ${HTTP_CLIENT_CONNECT_TIMEOUT_MS:3000}
    read-timeout-ms: ${HTTP_CLIENT_READ_TIMEOUT_MS:5000}
