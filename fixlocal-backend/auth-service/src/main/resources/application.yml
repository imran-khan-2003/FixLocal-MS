server:
  port: 8081
  shutdown: graceful
  ssl:
    enabled: ${SERVER_SSL_ENABLED:false}
    key-store: ${SERVER_SSL_KEY_STORE:}
    key-store-password: ${SERVER_SSL_KEY_STORE_PASSWORD:}
    key-store-type: ${SERVER_SSL_KEY_STORE_TYPE:PKCS12}
    key-alias: ${SERVER_SSL_KEY_ALIAS:}

spring:
  application:
    name: auth-service
  lifecycle:
    timeout-per-shutdown-phase: 20s
  data:
    mongodb:
      uri: ${MONGO_URI:mongodb://localhost:27017/fixlocal}

jwt:
  secret: ${JWT_SECRET:T2Zxk9D2c0lXQkVvR2R3c1F0U1Z3Y2RrN3Z4T3p1a2VnRzQ=}
  expiration: ${JWT_EXPIRATION:86400000}

management:
  endpoint:
    health:
      probes:
        enabled: true
      show-details: never
  health:
    livenessstate:
      enabled: true
    readinessstate:
      enabled: true
  endpoints:
    web:
      exposure:
        include: health,info

logging:
  pattern:
    level: "%5p [corr:%X{correlationId:-na}]"

http:
  client:
    connect-timeout-ms: ${HTTP_CLIENT_CONNECT_TIMEOUT_MS:3000}
    read-timeout-ms: ${HTTP_CLIENT_READ_TIMEOUT_MS:5000}

auth:
  payload-encryption:
    enabled: ${AUTH_PAYLOAD_ENCRYPTION_ENABLED:true}
    required: ${AUTH_PAYLOAD_ENCRYPTION_REQUIRED:true}
    key-id: ${AUTH_PAYLOAD_ENCRYPTION_KEY_ID:fixlocal-rsa-v1}
    public-key-pem: ${AUTH_PAYLOAD_ENCRYPTION_PUBLIC_KEY_PEM:}
    private-key-pem: ${AUTH_PAYLOAD_ENCRYPTION_PRIVATE_KEY_PEM:}