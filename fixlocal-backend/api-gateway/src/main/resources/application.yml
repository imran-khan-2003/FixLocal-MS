server:
  port: 8080
  shutdown: graceful

spring:
  application:
    name: api-gateway
  lifecycle:
    timeout-per-shutdown-phase: 20s
  cloud:
    gateway:
      server:
        webflux:
          default-filters:
            # Keep downstream CORS headers, but dedupe them across gateway+service responses.
            - DedupeResponseHeader=Access-Control-Allow-Credentials Access-Control-Allow-Origin Vary
          routes:
            - id: auth-service
              uri: ${AUTH_SERVICE_URL:http://localhost:8081}
              predicates:
                - Path=/api/v1/auth/**
            - id: user-service
              uri: ${USER_SERVICE_URL:http://localhost:8082}
              predicates:
                - Path=/api/v1/users/**,/api/v1/tradespersons/**
            - id: payment-service-booking-path
              uri: ${PAYMENT_SERVICE_URL:http://localhost:8087}
              predicates:
                - Path=/api/v1/bookings/*/payments/**
            - id: payment-service
              uri: ${PAYMENT_SERVICE_URL:http://localhost:8087}
              predicates:
                - Path=/api/v1/payments/**
            - id: booking-service
              uri: ${BOOKING_SERVICE_URL:http://localhost:8084}
              predicates:
                - Path=/api/v1/bookings/**
            - id: chat-service
              uri: ${CHAT_SERVICE_URL:http://localhost:8085}
              predicates:
                - Path=/api/v1/chat/**
            - id: notification-service
              uri: ${NOTIFICATION_SERVICE_URL:http://localhost:8086}
              predicates:
                - Path=/api/v1/notifications/**
            - id: review-service
              uri: ${REVIEW_SERVICE_URL:http://localhost:8088}
              predicates:
                - Path=/api/v1/reviews/**
            - id: dispute-service
              uri: ${DISPUTE_SERVICE_URL:http://localhost:8089}
              predicates:
                - Path=/api/v1/disputes/**
            - id: testimonial-service
              uri: ${TESTIMONIAL_SERVICE_URL:http://localhost:8090}
              predicates:
                - Path=/api/v1/testimonials/**
            - id: admin-service
              uri: ${ADMIN_SERVICE_URL:http://localhost:8091}
              predicates:
                - Path=/api/v1/admin/**
          globalcors:
            add-to-simple-url-handler-mapping: true
            cors-configurations:
              '[/**]':
                allowedOriginPatterns:
                  - ${APP_CORS_ALLOWED_ORIGINS:http://localhost:5173}
                allowedMethods:
                  - GET
                  - POST
                  - PUT
                  - PATCH
                  - DELETE
                  - OPTIONS
                  - HEAD
                allowedHeaders:
                  - "*"
                allowCredentials: true

management:
  endpoint:
    health:
      probes:
        enabled: true
      show-details: never
  health:
    livenessstate:
      enabled: true
    readinessstate:
      enabled: true
  endpoints:
    web:
      exposure:
        include: health,info

logging:
  pattern:
    level: "%5p [corr:%X{correlationId:-na}]"